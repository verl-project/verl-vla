# PI0 LIBERO adapter configuration.

# Select the LIBERO policy path in the model implementation.
embodiment: libero

# Optional external state/action normalization statistics JSON.
norm_stats_path: null

# Number of action steps returned to the environment by the PI0 policy adapter.
action_chunk_size: 10

# Optional critic owned by the PI0 adapter.
critic:

  # Whether this component is enabled.
  enabled: True

  # Backend or implementation type selected for this component.
  type: cross_attn

  # Number of workers allocated to this role.
  num: 10

  # Number of attention heads in the critic.
  head_num: 2

  # Number of attention heads in the critic prefix encoder.
  prefix_attn_heads: 8

  # Embedding dimension of the critic prefix encoder.
  prefix_embed_dim: 2048

  # Input feature dimension for the critic.
  input_dim: 2150

  # Hidden-layer dimensions for the critic.
  hidden_dims: [1024, 512, 256]

  # Mapping from task identifiers to critic checkpoints.
  task_to_critic: null

# DSRL latent-noise steering (arXiv:2506.15799): freeze the WHOLE VLA and
# train a small SAC noise actor over the flow-matching initial noise x0. The
# steering noise (not the model action) becomes the SAC action stored in
# replay under full_action; set critic.input_dim to
# prefix_embed_dim + state_dim + n_action_steps_or_1 * max_action_dim
# accordingly. Mutually exclusive with flow_sde_enable.
dsrl:

  # Master switch for DSRL noise steering.
  enabled: false

  # MLP trunk widths of the noise actor.
  hidden_dims: [256, 256, 256]

  # Projection width of the frozen pooled prefix features (2048 -> this).
  feature_latent_dim: 128

  # Projection width of the normalized robot state.
  state_latent_dim: 64

  # Optional explicit prefix-feature width; null derives it from the model.
  feature_dim: null

  # Optional explicit robot-state width; null derives it from the model.
  state_dim: null

  # false (RLinf parity): one shared noise vector broadcast over the chunk.
  # true: an independent noise vector per horizon step (larger action space).
  noise_per_step: false

  # tanh bound of the steering noise; x0 lives in [-noise_bound, noise_bound].
  noise_bound: 1.0

# Whether Flow-SDE is enabled.
flow_sde_enable: False

# Flow-SDE noise level.
flow_sde_noise_level: 0.08

# Whether Flow-SDE noise scheduling is enabled.
flow_sde_noise_schedule_enabled: False

# Initial Flow-SDE scheduled noise value.
flow_sde_noise_schedule_initial: null

# Final Flow-SDE scheduled noise value.
flow_sde_noise_schedule_final: null

# Flow-SDE schedule method.
flow_sde_noise_schedule_method: cos

# Optional task-specific Flow-SDE noise levels.
flow_sde_task_noise_level: ""

# Rollout-time Flow-SDE noise scale.
flow_sde_rollout_noise_scale: 1.0

# Train-time Flow-SDE noise scale.
flow_sde_train_noise_scale: 1.0

# Initial Flow-SDE beta.
flow_sde_initial_beta: 1.0

# Minimum Flow-SDE beta.
flow_sde_beta_min: 0.02

# Flow-SDE beta schedule horizon.
flow_sde_beta_schedule_T: 2000
