# VLA SAC cluster config structure:
#
# rob_sac_trainer
# |-- cluster: env-loop TrainCluster settings with actor-rollout and env workers.
# `-- ray_kwargs: Ray init kwargs used before the cluster is constructed.

defaults:

  # Attach the env + actor-rollout TrainCluster config under `cluster`.
  - /cluster@cluster: env_actor_rollout_cluster

  # Attach the SAC trainer loop config under `trainer`.
  - trainer@trainer: sac_trainer

  # Attach Ray initialization config under `ray_kwargs`.
  - /ray@ray_kwargs: default

  # Keep local overrides in this file taking precedence over composed defaults.
  - _self_
