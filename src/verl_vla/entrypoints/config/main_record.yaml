# VLA record config structure:
#
# main_record
# |-- cluster: env-only TrainCluster settings.
# |-- num_episodes: number of episodes to record.
# `-- ray_kwargs: Ray init kwargs used before the cluster is constructed.

defaults:

  # Attach the env-only TrainCluster config under `cluster`.
  - /cluster@cluster: env_cluster

  # Attach Ray initialization config under `ray_kwargs`.
  - /ray@ray_kwargs: default

  # Keep local overrides in this file taking precedence over composed defaults.
  - _self_


hydra:
  searchpath:
    - pkg://verl_vla.trainer.config


# Number of episodes to record before exiting.
num_episodes: 1



cluster:
  resource:
    env:
      nnodes: 1
      gpus_per_node: 1
      workers_per_node: 1
  env:
    env_worker:
      teleop:
        enable: True
        devices:
          - keyboard
      recorder:
        enable: True
        recorders:
          - lerobot
          - video
