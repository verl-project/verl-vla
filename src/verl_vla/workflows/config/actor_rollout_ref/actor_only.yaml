# Actor-only worker config.

defaults:

  # SFT actor worker config.
  - /actor@actor: sft_actor

  # HuggingFace model config.
  - /model@model: hf_model

  # Shared batch field names.
  - data_keys@data_keys

  # Apply this actor/rollout config last.
  - _self_


# Target class for actor/rollout config.
_target_: verl_vla.train_cluster.config.ActorRolloutRefConfig
