# VLA DAgger config structure:
#
# DAgger workflow
# |-- cluster: env-loop TrainCluster with rollout and env workers.
# |-- max_episodes: number of completed episodes to collect.
# `-- ray_kwargs: Ray init kwargs used before the cluster is constructed.

# Hydra configuration composition order.
defaults:

  # Attach the env + rollout TrainCluster config under `cluster`.
  - /cluster@cluster: env_rollout_cluster

  # Attach Ray initialization config under `ray_kwargs`.
  - /ray@ray_kwargs: default

  # Keep local overrides in this file taking precedence over composed defaults.
  - _self_


# Number of completed episodes to collect before exiting.
max_episodes: 1

# If True, append newly collected episodes to an existing output dataset and
# count existing episodes toward max_episodes.
resume: False


# Distributed cluster configuration.
cluster:

  # Environment execution configuration.
  env:

    # Environment interaction loop configuration.
    env_loop:

      # Number of stages in the environment rollout pipeline.
      pipeline_stage_num: 1

      # Maximum policy/environment interactions in one rollout.
      max_interactions: 16

    # Environment worker configuration.
    env_worker:

      # Whether completed environments reset automatically.
      auto_reset: True

      # Whether recording waits for operator confirmation.
      confirm_before_record: True

      # Target policy/environment interaction frequency in Hz.
      target_step_hz: 30

      # Teleoperation configuration.
      teleop:

        # Whether this component is enabled.
        enable: True

        # Teleoperation devices enabled for the environment.
        devices:

          - keyboard
      # Episode recorder configuration.
      recorder:

        # Whether this component is enabled.
        enable: True

        # LeRobot dataset recorder overrides.
        lerobot:

          # Root directory used by this component.
          root: outputs/dagger/lerobot

          # LeRobot dataset repository identifier.
          repo_id: local/verl_vla_libero_dagger

        # Video recorder overrides.
        video:

          # Root directory used by this component.
          root: outputs/dagger/videos
