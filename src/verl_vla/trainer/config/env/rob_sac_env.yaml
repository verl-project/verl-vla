# Environment configuration for SAC training
rollout:

  # Number of pipeline stages used by the env-loop rollout.
  pipeline_stage_num: 2

actor:
  model:

    # Number of action chunks predicted at each step.
    num_action_chunks: 8

    # Action dimension for the robot policy head.
    action_dim: 7

train:

  # Device used by environment workers: typically "cpu" or "cuda".
  device: cpu

  # Simulator backend for LIBERO tasks.
  simulator_type: libero

  # Maximum number of environment steps per episode.
  max_episode_steps: 512

  # Maximum model/env interaction rounds per rollout. Defaults to
  # max_episode_steps / num_action_chunks when left null.
  max_interactions: null

  # If True, reset completed envs immediately inside BaseEnv.step instead of
  # waiting for the next worker-level reset call.
  async_reset: False

  # Per-step penalty used to encourage shorter successful trajectories.
  step_penalty: 0.0

  # If True, only run evaluation without training updates.
  only_eval: False

  # Video recording options for rollouts.
  video_cfg:

    # Whether to save rollout videos.
    save_video: True

    # Output directory for saved rollout videos.
    video_base_dir: /tmp/videos

  # Optional recorders for simulator rollouts.
  recorder:

    # If True, create the selected recorder implementations per environment worker.
    enable: True

    # If True, run recorder writes on a background thread.
    async_enable: True

    # Maximum pending recorder commands before env stepping blocks.
    async_queue_size: 256

    # Recorder implementations to enable. Available: lerobot, video.
    recorders:
      - lerobot
      - video

    # LeRobot dataset recorder settings.
    lerobot:

      # Base local root used for per-env recorder directories.
      root: /tmp/verl_vla_lerobot_records

      # Base repo id. Rank and stage id are appended per recorder.
      repo_id: local/verl_vla_libero

      # Whether LeRobot should encode image observations as videos.
      use_videos: True

      # LeRobot image writer settings.
      image_writer_processes: 0
      image_writer_threads: 0
      batch_encoding_size: 1
      vcodec: libsvtav1
      # Keep each episode in a separate video shard to avoid PyAV concat time_base issues.
      video_files_size_in_mb: 1e-6

    # Visualization video recorder settings.
    video:

      # Output root. Videos are saved under rank/stage/env subdirectories.
      root: /tmp/verl_vla_recorder_videos

      # Frames per second for saved visualization videos.
      fps: 30

      # Font size for metadata text under visualization videos.
      font_size: 14

  # Number of simulator environments hosted by each env worker.
  num_envs: 16

  # Random seed for env initialization and reset sampling.
  seed: 42

  # LIBERO-specific simulator settings.
  libero:

    # LIBERO task suite name.
    task_suite_name: libero_spatial

    # Optional task ids to sample/evaluate, e.g. [0] or [0, 1, 2].
    task_ids: null

    # Optional cap on the number of initial states per selected task.
    num_trials_per_task: null

    # Optional global LIBERO reset id for fixed-task/state debugging.
    specific_reset_id: null

    # Number of zero-action simulator steps after reset to settle observations.
    reset_warmup_steps: 10

    # LIBERO OffScreenRenderEnv initialization parameters.
    init_params:

      # Whether to render depth images from cameras.
      camera_depths: False

      # Camera image height.
      camera_heights: 256

      # Camera image width.
      camera_widths: 256

      # Camera views included in each observation.
      camera_names:
        - agentview
        - robot0_eye_in_hand

  # IsaacLab-Arena-specific simulator settings.
  arena:

    # Arena example environment name.
    env_name: put_item_in_fridge_and_close_door

    # Arena object asset name passed to the environment builder.
    object: ranch_dressing_hope_robolab

    # Arena robot embodiment/control mode.
    embodiment: gr1_joint

    # Optional Arena object set.
    object_set: null

    # Kitchen style used by kitchen manipulation Arena tasks.
    kitchen_style: 2

    # Fallback task text when the Arena task object does not provide one.
    task_description: Place the sauce bottle on the top shelf of the fridge, and close the fridge door.

    # Whether to enable IsaacLab cameras.
    enable_cameras: True

    # Camera views included in each observation.
    camera_names:
      - robot_head_cam_rgb

    # Default camera image shape used before the first observation is available.
    image_shape:
      - 480
      - 640
      - 3

    # Convert Arena success termination into an RL reward term.
    rl_success_reward: True

    # Use graded subtask reward instead of sparse task success reward.
    subtask_reward: False

    # Spacing between vectorized Arena environments.
    env_spacing: 30.0

    # Whether to disable IsaacLab Fabric.
    disable_fabric: False

    # Whether Arena should solve object relations before spawning.
    solve_relations: True

    # Whether to enable Pinocchio support for Arena embodiments.
    enable_pinocchio: True

    # Optional seed for relation placement.
    placement_seed: null

    # Optional relation solving mode on reset.
    resolve_on_reset: null

    # Optional Arena preset names.
    presets: null

  # Lightweight web service for human teleoperation and observation streaming.
  teleop:

    # Start one observation web server per vectorized LIBERO environment.
    enable: True

    # Web server settings for observation streaming and browser input.
    server:

      # Bind host for browser access. Use 127.0.0.1 when tunneling from a remote machine.
      host: "0.0.0.0"

      # Port formula: base_port + rank * rank_stride + stage_id * stage_stride + env_id.
      base_port: 18000
      rank_stride: 10000
      stage_stride: 1000

      # JPEG quality for streamed observation images.
      jpeg_quality: 100

      # Uvicorn log level for each small obs server.
      log_level: warning

      # WebXR immersive sessions require a secure context on remote browsers.
      # Fill both paths to serve HTTPS/WSS for XR headsets.
      ssl_certfile: /file_system/liujincheng/Projects/verl-vla/certs/teleop.crt
      ssl_keyfile: /file_system/liujincheng/Projects/verl-vla/certs/teleop.key

    # Human intervention input devices enabled in the browser and backend.
    devices:
      - keyboard
      - xr_controller
      - gamepad

    # Keyboard SE(3) relative action sensitivities for LIBERO.
    keyboard:
      pos_sensitivity: 0.5
      rot_sensitivity: 0.12

    # WebXR controller relative SE(3) action mapping for LIBERO.
    xr_controller:
      hand: right
      pos_sensitivity: 150.0
      rot_sensitivity: 4.0
      intervention_button: squeeze
      gripper_button: trigger
      button_threshold: 0.5

    # Gamepad controller relative SE(3) action mapping for LIBERO.
    gamepad:
      pos_sensitivity: 0.5
      rot_sensitivity: 1.0
      intervention_button: RT
      gripper_button: X
      button_threshold: 0.5
      left_stick_x_axis: axis_0
      left_stick_y_axis: axis_1
      right_stick_y_axis: axis_3
      right_stick_x_axis: axis_2
      dpad_up_button: DUp
      dpad_down_button: DDown
      dpad_left_button: DLeft
      dpad_right_button: DRight

disagg_sim:

  # Whether simulator workers run on separate nodes from training workers.
  enable: False

  # Number of simulator nodes when disaggregated simulation is enabled.
  nnodes: 1
