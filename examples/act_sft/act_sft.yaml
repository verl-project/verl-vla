# ACT SFT composition for this example.
# Hydra runtime configuration.
hydra:

  # Load reusable workflow configs from the installed verl-vla package.
  searchpath:

    - pkg://verl_vla.workflows.config

# Hydra configuration composition order.
defaults:

  # Reuse the complete standalone SFT workflow.
  - /train/sft@_global_

  # Select the ACT native-policy configuration and LIBERO adapter.
  - override /model/override@cluster.actor_rollout_ref.model.override_config: act
  - override /model/adapter@cluster.actor_rollout_ref.model.adapter: act

  - _self_

cluster:
  checkpoint:
    # Keep resumable checkpoints under the run's training output directory.
    default_local_dir: ./outputs/train/act-sft/libero-spatial/checkpoints

  actor_rollout_ref:
    model:
      load_tokenizer: false
      # A config-only ACT initializer derives native state/action processors
      # from this dataset. Exported checkpoints reload their saved processors.
      adapter:
        processor_dataset_root: ${data.repo_id}

    actor:
      fsdp_config:
        # ACT is small enough to keep parameters materialized between forward
        # and backward, avoiding another all-gather for each training step.
        reshard_after_forward: false
        wrap_policy:
          transformer_layer_cls_to_wrap:
            - ACTEncoderLayer
            - ACTDecoderLayer

data:
  # Match the chunk_size in assets/hf_models/act_libero/config.json.
  action_delta_steps: 10

trainer:

  # Tracking project shared by ACT SFT runs.
  project_name: act-sft

  # Tracking run name for the LIBERO Spatial dataset.
  experiment_name: libero-spatial

  # Save a resumable checkpoint every 500 optimizer steps.
  save_freq: 500

ray_kwargs:
  ray_init:
    runtime_env:
      env_vars:
        # verl's TensorBoard logger reads this path inside the Ray controller.
        TENSORBOARD_DIR: ./outputs/train/act-sft/libero-spatial/tensorboard
