hydra:
  searchpath:
    - pkg://verl_vla.workflows.config

defaults:

  # Rollout-only model and environment cluster.
  - /cluster@cluster: env_rollout_cluster

  # Ray initialization shared by operational workflows.
  - /ray@ray_kwargs: default

  - _self_


# Null evaluates every episode reported by the environment benchmark.
max_episodes: null

# Evaluation artifacts share one output directory.
output_dir: outputs/eval


cluster:
  actor_rollout_ref:
    model:
      adapter:
        critic:
          enabled: false

    rollout:
      output_critic_value: false

  env:
    env_loop:
      max_interactions: 8

    env_worker:
      auto_reset: true
      modes:
        - eval
      recorder:
        enable: true
        recorders:
          - video
        video:
          root: ${output_dir}/videos

  resource:
    env:
      device: cpu
      workers_per_node: 1

    model:
      gpus_per_node: 1
