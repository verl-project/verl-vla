# Recorder configuration for TrainCluster rollout smoke tests.

defaults:

  # LeRobot recorder config.
  - /env/recorder@lerobot: lerobot

  # Video recorder config.
  - /env/recorder@video: video

  # Apply this recorder config last.
  - _self_


# Target class for recorder config.
_target_: verl_vla.recorder.config.RecorderConfig

# Whether to create recorder implementations per environment worker.
enable: False

# Whether recorder writes run on a background thread.
async_enable: True

# Maximum pending recorder commands before env stepping blocks.
async_queue_size: 256

# Recorder implementations to enable when recording is turned on.
recorders:
  - lerobot
  - video
