# Global profiling config shared by trainer and TrainCluster worker groups.

# Required when using Hydra to instantiate profiler configs.
_target_: verl.utils.profiler.ProfilerConfig

# Profiling tool: choose between nsys, npu, torch, and torch_memory.
tool: null

# Trainer steps to profile.
steps: null

# Whether to combine continuous profiled steps into one profile database.
profile_continuous_steps: False

# Path to save profiling outputs.
save_path: outputs/profile

# Tool-specific profiler configs.
global_tool_config:

  # Nsight Systems profiling config.
  nsys:

    # Required when using Hydra to instantiate Nsight configs.
    _target_: verl.utils.profiler.config.NsightToolConfig

    # Whether each task writes its own database.
    discrete: False

    # Controller-side Nvidia Nsight Systems options.
    controller_nsight_options:

      # APIs traced by Nsight.
      trace: cuda,nvtx,cublas,ucx

      # Whether to track CUDA memory usage.
      cuda-memory-usage: "true"

      # CUDA graph trace mode.
      cuda-graph-trace: graph

    # Worker-side Nvidia Nsight Systems options.
    worker_nsight_options:

      # APIs traced by Nsight.
      trace: cuda,nvtx,cublas,ucx

      # Whether to track CUDA memory usage.
      cuda-memory-usage: "true"

      # CUDA graph trace mode.
      cuda-graph-trace: graph

      # Profile only inside torch.cuda.profiler start/stop ranges.
      capture-range: cudaProfilerApi

      # Capture range end behavior.
      capture-range-end: null

      # Signal behavior when profiling ends.
      kill: none

  # Torch memory snapshot config.
  torch_memory:

    # Maximum number of allocation entries to record.
    trace_alloc_max_entries: 100_000

    # Call stack depth captured for each allocation.
    stack_depth: 32

    # Memory event context: alloc, state, or all.
    context: all

    # Stack source: python, cpp, or all.
    stacks: all

    # Additional keyword arguments forwarded to the profiler.
    kw_args: {}
