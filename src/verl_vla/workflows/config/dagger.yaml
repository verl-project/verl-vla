# VLA DAgger config structure:
#
# DAgger workflow
# |-- cluster: env-loop TrainCluster with rollout and env workers.
# |-- max_episodes: number of completed episodes to collect.
# `-- ray_kwargs: Ray init kwargs used before the cluster is constructed.

defaults:

  # Attach the env + rollout TrainCluster config under `cluster`.
  - /cluster@cluster: env_rollout_cluster

  # Attach Ray initialization config under `ray_kwargs`.
  - /ray@ray_kwargs: default

  # Keep local overrides in this file taking precedence over composed defaults.
  - _self_


# Number of completed episodes to collect before exiting.
max_episodes: 1

# If True, append newly collected episodes to an existing output dataset and
# count existing episodes toward max_episodes.
resume: False


cluster:
  resource:
    env:
      nnodes: 1
      gpus_per_node: 1
      workers_per_node: 1
  env:
    env_loop:
      pipeline_stage_num: 1
      max_interactions: 16
    env_worker:
      auto_reset: True
      confirm_before_record: True
      num_envs: 1
      teleop:
        enable: True
        devices:
          - keyboard
      recorder:
        enable: True
        recorders:
          - lerobot
          - video
        lerobot:
          root: outputs/dagger/lerobot
          repo_id: local/verl_vla_libero_dagger
        video:
          root: outputs/dagger/videos
