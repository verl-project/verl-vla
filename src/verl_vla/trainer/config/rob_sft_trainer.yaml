# VLA SFT config structure:
#
# rob_sft_trainer
# |-- cluster: actor-only TrainCluster settings.
# |-- data: LeRobot dataset and PyTorch dataloader settings.
# |-- trainer: SFT trainer loop, resume, logging, and checkpoint-save settings.
# `-- ray_kwargs: Ray init kwargs used before the trainer is constructed.

defaults:

  # Attach the actor-only TrainCluster config under `cluster`.
  - /cluster@cluster: actor_cluster

  # Attach the LeRobot dataloader config under `data`.
  - data@data: lerobot_dataloader

  # Attach the SFT trainer loop config under `trainer`.
  - trainer@trainer: sft_trainer

  # Attach Ray initialization config under `ray_kwargs`.
  - /ray@ray_kwargs: default

  # Keep local overrides in this file taking precedence over composed defaults.
  - _self_
