# ReCap policy-evaluation stage.

defaults:

  # Env-loop cluster used for policy evaluation.
  - /cluster@cluster: env_rollout_cluster

  # Apply this stage config last.
  - _self_


# Whether to evaluate the final RECAP policy.
enable: false

# Policy checkpoint used when this stage runs without fresh policy training.
model_path: checkpoints/recap/policy/global_step_2150/actor/huggingface

# Optional cap on evaluated episodes. Null evaluates the benchmark size reported
# by the eval environment.
max_episodes: null

# Whether the first RECAP iteration should evaluate without ACP prompt tagging.
disable_acp_on_first_iteration: true

# Directory used to save per-iteration policy-eval metric JSON files. Set null
# to disable writing eval results.
result_dir: outputs/recap/eval_results


# Policy evaluation initializes only eval simulators and disables dataset/video recording.
cluster:
  env:
    env_loop:
      max_interactions: 256

    env_worker:
      modes:
        - eval
      recorder:
        enable: true
        recorders:
          - video
