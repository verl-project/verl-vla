# Instantiate the shared verl HuggingFace model config class.
defaults:

  # Model-specific adapter configuration.
  - adapter@adapter: pi0

  # LoRA configuration inherited by every native VLA policy.
  - lora@lora: default

  # Optional native-policy configuration overrides.
  - optional override@override_config: null

  # Apply this HuggingFace model config last.
  - _self_


# Target class for this configuration.
_target_: verl_vla.workers.config.VLAModelConfig

# Default model path. Override this for a different HF checkpoint.
path: Miical/pi05-base

# Tokenizer path defaults to the model path.
tokenizer_path: ${.path}

# Whether to load a standalone Hugging Face tokenizer for the policy.
load_tokenizer: True

# Whether to stage model files through shared memory.
use_shm: False

# Whether to allow custom code from the model repository.
trust_remote_code: False

# Whether to enable gradient checkpointing while building the model.
enable_gradient_checkpointing: False

# Whether to offload activations to reduce GPU memory pressure.
enable_activation_offload: False

# Whether to remove padding before model forward when the model/engine supports it.
use_remove_padding: False

# Official policy config overrides are reserved for legacy model integrations.
override_config: {}
