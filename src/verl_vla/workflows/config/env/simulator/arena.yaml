# Isaac Lab Arena simulator configuration.

_target_: verl_vla.envs.arena.config.ArenaSimulatorConfig

# Simulator backend selected by EnvWorker.
simulator_type: arena

# Maximum number of simulator steps per episode.
max_episode_steps: 20

# Random seed for Arena placement and simulator initialization.
seed: 42

# Arena G1 WBC joint action dimension.
action_dim: 50

# Optional observation state dimension override. Null lets the env infer it.
state_dim: null

# Registered Arena example environment name.
env_name: galileo_g1_locomanip_pick_and_place

# Object and robot embodiment passed to Arena's environment builder.
object: brown_box
embodiment: g1_wbc_joint

# Optional Arena object set override.
object_set: null

# Kitchen/background style for Arena tasks that support it.
kitchen_style: 2

# Fallback language task description when the Arena task does not provide one.
task_description: Pick and place the brown box.

# Whether to enable Isaac/Arena camera sensors.
enable_cameras: true

# Camera observation names exported to the policy/recorder.
camera_names:
  - robot_head_cam_rgb

# Expected image shape for recorder metadata.
image_shape:
  - 480
  - 640
  - 3

# Replace Arena task reward with an RL success reward and disable autoreset.
rl_success_reward: true

# Whether the success reward should be computed from Arena subtask progress.
subtask_reward: false

# Spacing between vectorized Arena environments.
env_spacing: 30.0

# Isaac Lab fabric toggle forwarded to the Arena builder.
disable_fabric: false

# Whether Arena should solve scene relation constraints during construction.
solve_relations: true

# Whether to enable Pinocchio for G1 whole-body control.
enable_pinocchio: true

# Optional placement randomization seed override.
placement_seed: null

# Optional relation-solving-on-reset override.
resolve_on_reset: null

# Optional Arena preset name.
presets: null
