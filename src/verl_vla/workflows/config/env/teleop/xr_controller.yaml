# WebXR controller teleop device configuration.

# Target class for WebXR controller teleop config.
_target_: verl_vla.teleop.config.XRControllerTeleopConfig

# Controller hand to track.
hand: right

# Position sensitivity for SE(3) relative actions.
pos_sensitivity: 1.0

# Rotation sensitivity for SE(3) relative actions.
rot_sensitivity: 0.5

# Button used to mark intervention.
intervention_button: squeeze

# Button used for gripper control.
gripper_button: trigger

# Button threshold for analog inputs.
button_threshold: 0.5
