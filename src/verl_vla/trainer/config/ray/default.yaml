# Ray initialization and optional debugging config.

# Keyword arguments forwarded to ray.init.
ray_init:

  # Number of CPUs for Ray. Use a fixed number instead of null when using SLURM.
  num_cpus: null

  # Logging level forwarded to ray.init.
  logging_level: INFO

  # Runtime environment merged on top of verl's default PPO runtime env.
  runtime_env:

    # Environment variables propagated to Ray workers.
    env_vars:

      # MuJoCo renderer backend for headless LIBERO simulation.
      # Use egl for GPU rendering, or osmesa for CPU rendering.
      MUJOCO_GL: osmesa

      # Default logging level for verl-vla worker loggers.
      VERL_LOGGING_LEVEL: INFO

      # Hugging Face access token propagated from the launcher environment.
      HF_TOKEN: ${oc.env:HF_TOKEN,""}
