# Browser gamepad teleop device configuration.

# Target class for browser gamepad teleop config.
_target_: verl_vla.teleop.config.GamepadTeleopConfig

# Position sensitivity for SE(3) relative actions.
pos_sensitivity: 0.5

# Rotation sensitivity for SE(3) relative actions.
rot_sensitivity: 0.5

# Button used to mark intervention.
intervention_button: RT

# Button used for gripper control.
gripper_button: X

# Button threshold for analog inputs.
button_threshold: 0.5

# Maximum number of recent browser gamepad events retained by the backend.
max_events: 256

# Axis name for left stick horizontal motion.
left_stick_x_axis: axis_0

# Axis name for left stick vertical motion.
left_stick_y_axis: axis_1

# Axis name for right stick vertical motion.
right_stick_y_axis: axis_3

# Axis name for right stick horizontal motion.
right_stick_x_axis: axis_2

# Button name for D-pad up.
dpad_up_button: DUp

# Button name for D-pad down.
dpad_down_button: DDown

# Button name for D-pad left.
dpad_left_button: DLeft

# Button name for D-pad right.
dpad_right_button: DRight
