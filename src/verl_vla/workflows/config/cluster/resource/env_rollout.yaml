# Resource placement for env + rollout clusters.

# Target class for env-loop resource placement.
_target_: verl_vla.train_cluster.config.EnvLoopTrainResourceConfig

# Optional Ray resource label for the controller process.
controller_label: null

# Environment worker resource placement.
env:

  # Target class for a resource pool placement.
  _target_: verl_vla.train_cluster.config.ResourceConfig

  # Device type used by environment workers.
  device: cuda

  # Optional Ray resource label for environment worker placement.
  resource_label: null

  # Number of nodes used by environment workers.
  nnodes: 1

  # Number of GPUs reserved per environment worker node.
  gpus_per_node: 1

  # Number of environment worker processes per node.
  workers_per_node: 1

# Model rollout worker resource placement.
model:

  # Target class for a resource pool placement.
  _target_: verl_vla.train_cluster.config.ResourceConfig

  # Device type used by model rollout workers.
  device: cuda

  # Optional Ray resource label for model rollout worker placement.
  resource_label: null

  # Number of nodes used by model rollout workers.
  nnodes: 1

  # Number of GPUs reserved per model rollout worker node.
  gpus_per_node: 1

  # Number of model rollout worker processes per node.
  workers_per_node: 1

# Optional separated rollout-model resource placement.
separate_rollout_model:

  # Target class for optional resource pool placement.
  _target_: verl_vla.train_cluster.config.OptionalResourceConfig

  # Whether rollout workers use a separate model resource pool.
  enabled: False

  # Device type used by separated rollout model workers.
  device: cuda

  # Optional Ray resource label for separated rollout model placement.
  resource_label: null

  # Number of nodes used by separated rollout model workers.
  nnodes: 1

  # Number of GPUs reserved per separated rollout model node.
  gpus_per_node: 1

  # Number of separated rollout model worker processes per node.
  workers_per_node: 1
