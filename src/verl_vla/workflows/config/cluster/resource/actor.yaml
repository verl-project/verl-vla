# Resource placement for actor-only clusters.

# Target class for SFT resource placement.
_target_: verl_vla.train_cluster.config.SFTTrainResourceConfig

# Optional Ray resource label for the controller process.
controller_label: null

# Model actor worker resource placement.
model:

  # Target class for a resource pool placement.
  _target_: verl_vla.train_cluster.config.ResourceConfig

  # Device type used by actor workers.
  device: cuda

  # Optional Ray resource label for actor worker placement.
  resource_label: null

  # Number of nodes used by actor workers.
  nnodes: 1

  # Number of GPUs reserved per actor worker node.
  gpus_per_node: 1

  # Number of actor worker processes per node.
  workers_per_node: 1
