# GR00T N1.7 LIBERO model config overrides (SFT).
#
# The GR00T defaults live in configuration_gr00t_torch.py; this override only
# sets the fields the SFT recipe needs, mirroring model/override/pi0.yaml.

# Select the LIBERO policy adapter in the model implementation.
policy_type: libero

# libero_sim projector index (EMBODIMENT_TAG_TO_PROJECTOR_INDEX in gr00t_utils.py).
embodiment_id: 2

# Number of action steps returned to the environment by the GR00T policy adapter.
action_chunk_size: 10

# Supervised horizon for SFT (upstream libero_sim uses delta_indices range(16)).
sft_action_horizon: 16

# Pure SFT: no SAC critic heads (rollout/eval can re-enable via main_sac override).
sac_enable: False

# Flow-SDE is a rollout-time stochastic sampler; disable for supervised training.
flow_sde_enable: False
