defaults:

  # Reuse the standard LeRobot dataset/dataloader fields for offline replay reads.
  - /data@dataloader: lerobot_dataloader

  # Keep RLPD-specific defaults and dataloader overrides in this file taking precedence.
  - _self_

# Instantiate the VLA SAC RLPD replay prefill config class.
_target_: verl_vla.utils.rlpd.RLPDConfig

# Whether to enable RLPD replay prefill.
enable: False

# Optional list of episode indices to load.
episodes: null

# Maximum number of offline transitions to prefill. A non-positive value means all.
max_transitions: 0

# Flush prefill data to workers after this many transitions. A non-positive value submits once at the end.
submit_max_transitions: 256

# Number of low-level LeRobot actions compressed into each SAC action chunk.
action_chunk_steps: 10

# Number of low-level frames between replay transitions. Null uses action_chunk_steps; set 1 for full overlap.
transition_stride: null

# Add one terminal chunk per episode with s1=s0 and a1=a0 so sparse final rewards enter replay.
include_final_transition: true
