defaults:

  # Attach the early stopping config under `early_stopping`.
  - /trainer/early_stopping@early_stopping: early_stop

  # Keep local trainer fields in this file taking precedence.
  - _self_

# Instantiate the VLA SFT trainer config class.
_target_: verl_vla.trainer.sft.config.SFTTrainerConfig

# Tracking project name.
project_name: vla-sft

# Tracking experiment/run name.
experiment_name: lerobot-preview

# Tracking backends used by the trainer.
logger: ["console"]

# Number of full dataloader passes.
total_epochs: 30

# Checkpoint save interval in global steps. Negative disables interval saves.
save_freq: -1

# Whether to save a checkpoint at the final training step.
save_last: False

# Extra time budget used by ESI preemption-aware checkpointing.
esi_redundant_time: 0

# Whether to restore dataloader state when resuming from a checkpoint.
resume_dataloader_state: True
