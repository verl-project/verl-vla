# ReCap value-inference stage.

defaults:

  # Attach the LeRobot dataloader config used for value inference.
  - /data@data: lerobot_dataloader

  # Apply this stage config last.
  - _self_


# Whether to infer RECAP values after value-model training.
enable: true

# Dataset used when this stage runs without fresh collected datasets.
dataset:
  root: /tmp/verl_vla_lerobot_records/local/verl_vla_libero_collected
  repo_id: local/verl_vla_libero_collected

# Value model checkpoint used when this stage runs without fresh value-model training.
model_path: checkpoints/recap/value_model/global_step_2100/actor/huggingface

# Inference runtime settings.
device: cuda
precision: bfloat16
num_gpus: 1

# ACP label settings written from inferred values.
n_step: 50
positive_ratio: 0.3
force_intervention_positive: true

# Indicator score strategy:
# - raw_advantage: current behavior, top positive_ratio by n-step advantage.
# - future_smoothed_advantage: top positive_ratio by exponentially weighted
#   future n-step advantages.
indicator_strategy: future_smoothed_advantage
advantage_smoothing_window: 50
advantage_smoothing_decay: 0.95

# Value inference reads one frame at a time and does not need future action chunks.
data:
  action_delta_steps: 0
  shuffle: false
  drop_last: false
