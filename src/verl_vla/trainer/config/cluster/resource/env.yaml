# Resource placement for env-only clusters.

# Target class for env-only resource placement.
_target_: verl_vla.trainer.train_cluster.config.EnvTrainResourceConfig

# Optional Ray resource label for the controller process.
controller_label: null

# Environment worker resource placement.
env:

  # Target class for a resource pool placement.
  _target_: verl_vla.trainer.train_cluster.config.ResourceConfig

  # Device type used by environment workers.
  device: cpu

  # Optional Ray resource label for environment worker placement.
  resource_label: null

  # Number of nodes used by environment workers.
  nnodes: 1

  # Number of GPUs reserved per environment worker node. Unused for CPU pools.
  gpus_per_node: 0

  # Number of environment worker processes per node.
  workers_per_node: 1
