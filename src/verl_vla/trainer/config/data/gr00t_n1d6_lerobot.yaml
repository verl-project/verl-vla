# GR00T uses the same raw LeRobot/DataProto contract as the other VLA policies.
_target_: verl_vla.utils.dataloader.LeRobotDataLoaderConfig

# Hugging Face repo id for LIBERO Spatial demonstrations.
repo_id: lerobot/libero_spatial_image

# Optional local dataset root.
root: null

# Dataset revision.
revision: main

# Global dataloader batch size.
batch_size: 32

# Number of CPU processor workers.
num_workers: 4

# Keep workers alive between epochs.
persistent_workers: True

# Batches prefetched by each worker.
prefetch_factor: 2

# Pin processed tensors before dispatch.
pin_memory: True

# Shuffle training samples.
shuffle: True

# Drop incomplete distributed batches.
drop_last: True

# Dataloader seed.
seed: 42

# LeRobot video decoder.
video_backend: pyav

# Number of future LIBERO actions supplied to the GR00T wrapper.
action_delta_steps: 16
