# Actor-only TrainCluster config for SFT-style training.

defaults:

  # Resource placement used by TrainCluster.
  - /cluster/resource@resource: actor

  # Actor worker config.
  - /actor_rollout_ref@actor_rollout_ref: actor_only

  # Checkpoint path, retention, and resume config.
  - /cluster/checkpoint@checkpoint: actor

  # Apply this TrainCluster config last.
  - _self_


# Target class for this cluster configuration.
_target_: verl_vla.train_cluster.config.SFTTrainClusterConfig
