# VLA teleop config structure:
#
# Teleoperation workflow
# |-- cluster: env-only TrainCluster settings.
# `-- ray_kwargs: Ray init kwargs used before the cluster is constructed.

# Hydra configuration composition order.
defaults:

  # Attach the env-only TrainCluster config under `cluster`.
  - /cluster@cluster: env_cluster

  # Attach Ray initialization config under `ray_kwargs`.
  - /ray@ray_kwargs: default

  # Keep local overrides in this file taking precedence over composed defaults.
  - _self_


# Distributed cluster configuration.
cluster:

  # Environment execution configuration.
  env:

    # Environment interaction loop configuration.
    env_loop:

      # Teleoperation runs one simulator synchronously.
      pipeline_stage_num: 1

    # Environment worker configuration.
    env_worker:

      # Pace operator-driven control at the intended interaction rate.
      target_step_hz: 30

      # Teleoperation configuration.
      teleop:

        # Whether this component is enabled.
        enable: True

        # Teleoperation devices enabled for the environment.
        devices:

          - keyboard
