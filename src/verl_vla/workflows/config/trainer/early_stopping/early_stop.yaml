# Instantiate the trend early stopping config class.
_target_: verl_vla.utils.early_stopping.TrendEarlyStoppingConfig

# Whether to enable early stopping.
enable: False

# Metric name to monitor.
metric: sft/loss

# Number of recent metric points used to fit the loss trend.
window_size: 100

# Minimum relative improvement required inside the fitted window.
min_improvement_ratio: 0.001

# Number of consecutive bad windows allowed before stopping.
patience_windows: 3

# Number of initial trainer steps ignored by early stopping.
warmup_steps: 200
