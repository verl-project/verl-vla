hydra:
  searchpath:
    - pkg://verl_vla.workflows.config

defaults:

  # Stage 1: evaluate the configured RECAP policy on the environment benchmark.
  - /recap/policy_eval@recap.policy_eval

  # Stage 2: collect rollout data into a LeRobot dataset.
  - /recap/collect_data@recap.collect_data

  # Stage 3: compute RECAP returns for the collected LeRobot dataset.
  - /recap/compute_return@recap.compute_return

  # Stage 4: train the RECAP value model with actor-only SFT.
  - /recap/train_value_model@recap.train_value_model

  # Stage 5: infer RECAP values and write them back to the LeRobot dataset.
  - /recap/value_infer@recap.value_infer

  # Stage 6: train the final RECAP policy with actor-only SFT.
  - /recap/train_policy@recap.train_policy

  # Attach Ray initialization config shared by RECAP stages under `ray_kwargs`.
  - /ray@ray_kwargs: default

  - _self_


# RECAP loop settings.
recap:
  _target_: verl_vla.trainer.recap.config.MainReCapConfig

  # Number of full RECAP iterations to run.
  num_iterations: 1

  # One-based RECAP iteration to resume from.
  resume_iteration: 1

  # One-based stage step to enter within resume_iteration:
  # 1 policy_eval, 2 collect_data, 3 compute_return, 4 train_value_model,
  # 5 value_infer, 6 train_policy.
  resume_step: 1

  # Optional cumulative LeRobot dataset root used by RECAP SFT stages.
  # Null keeps using the freshly collected dataset for the current iteration.
  sft_dataset_path: null
