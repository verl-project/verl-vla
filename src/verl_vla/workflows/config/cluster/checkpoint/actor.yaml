# Target class for cluster checkpoint config.
_target_: verl_vla.train_cluster.config.TrainClusterCheckpointConfig

# Resume behavior: auto, disable, or resume_path.
resume_mode: auto

# Explicit checkpoint path used when resume_mode is resume_path.
resume_from_path: null

# Optional remote checkpoint root. SFT load from HDFS is not implemented yet.
default_hdfs_dir: null

# Local checkpoint root.
default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}

# Whether to delete local checkpoint files after loading.
del_local_ckpt_after_load: False

# Maximum number of actor checkpoints to keep. Null keeps all.
max_actor_ckpt_to_keep: null
