# Simulator selection and per-simulator configs.

defaults:

  # LIBERO simulator config.
  - /env/simulator@libero: libero

  # Isaac Lab Arena simulator config.
  - /env/simulator@arena: arena

  # Apply selector config last.
  - _self_


_target_: verl_vla.workers.env.config.SimulatorConfig

# Active simulator backend. The selected value chooses which nested simulator
# config EnvWorker will use to construct the concrete environment.
simulator_type: libero
