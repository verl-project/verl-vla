# Environment configuration for TrainCluster rollout smoke tests.

# Hydra configuration composition order.
defaults:

  # Simulator config used by environment workers.
  - simulator@env_worker.simulator: simulator

  # Teleop config used by environment workers.
  - teleop@env_worker.teleop: teleop

  # Recorder config used by environment workers.
  - recorder@env_worker.recorder: recorder

  # Apply this env config last.
  - _self_


# Target class for TrainCluster environment config.
_target_: verl_vla.train_cluster.config.EnvTrainConfig


# Environment interaction loop configuration.
env_loop:

  # Target class for env-loop rollout scheduling.
  _target_: verl_vla.train_cluster.config.EnvLoopConfig

  # Number of pipeline stages used by the env-loop rollout.
  pipeline_stage_num: 2

  # Maximum model/env interaction rounds per rollout.
  max_interactions: 8


# Environment worker configuration.
env_worker:

  # Target class for environment worker config.
  _target_: verl_vla.workers.env.config.EnvWorkerConfig

  # If True, reset completed envs automatically inside BaseEnv.step.
  auto_reset: False

  # If True, require a teleop confirmation key before recording each episode.
  confirm_before_record: False

  # If True, print simulator, teleop publishing, recording, and total latency for every environment step.
  log_step_latency: False

  # Target mask-step call frequency in Hz; null disables pacing and rate warnings.
  target_step_hz: null

  # Simulator modes initialized by the environment worker.
  modes:

    - train

  # Number of simulator environments hosted by each env worker.
  num_envs: 1

  # Seconds to wait for each simulator subprocess to finish initialization.
  simulator_start_timeout_s: 180
