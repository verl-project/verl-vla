# Env rollout TrainCluster config.

defaults:

  # Resource placement used by TrainCluster.
  - /cluster/resource@resource: env_rollout

  # Actor/rollout worker config.
  - /actor_rollout_ref@actor_rollout_ref: rollout_only

  # Environment config.
  - /env@env: env

  # Apply this TrainCluster config last.
  - _self_


# Target class for this cluster configuration.
_target_: verl_vla.train_cluster.config.EnvLoopTrainClusterConfig
