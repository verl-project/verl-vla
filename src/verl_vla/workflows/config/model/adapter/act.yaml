# ACT LIBERO adapter configuration.

# Policy I/O adapter registered under verl_vla.models.act_torch.policy.
policy_type: libero

# Number of decoded action steps executed per environment interaction.
n_action_steps: 20

# Optional temporal ensembling coefficient for rollout-time smoothing.
temporal_ensemble_coeff: null

# Optional robot-state normalization statistics override.
state_norm_stats: null

# Optional action normalization statistics override.
action_norm_stats: null

# Optional camera-image normalization statistics override.
image_norm_stats: null

# Optional critic owned by the adapter rather than the native ACT policy.
critic:

  # Whether to construct the critic for SAC training.
  enabled: False

  # Critic architecture implementation.
  type: mean_pool

  # Number of Q-value heads produced by the critic.
  head_num: 2

  # Prefix embedding dimension used by the critic.
  prefix_embed_dim: 512

  # Optional input dimension override for critic features.
  input_dim: 0

  # Hidden-layer dimensions for the critic MLP.
  hidden_dims: [1024, 512, 256]

# Base Gaussian action noise scale used by SAC actor sampling.
sac_action_noise_scale: 0.1

# Whether SAC action-noise scheduling is enabled.
sac_action_noise_schedule_enabled: False

# Initial SAC scheduled action-noise value.
sac_action_noise_schedule_initial: null

# Final SAC scheduled action-noise value.
sac_action_noise_schedule_final: null

# SAC action-noise schedule method.
sac_action_noise_schedule_method: cos

# Whether to freeze the vision backbone during training.
freeze_vision_tower: True

# Optional learning-rate override for the vision backbone optimizer group.
optimizer_lr_backbone: 1e-5
