# GR00T N1.6 SFT composition for this example.
defaults:

  # Reuse the complete standalone SFT workflow.
  - /train/sft@_global_

  # Select GR00T compatibility fields declared by the native-model configuration.
  - override /model/override@cluster.actor_rollout_ref.model.override_config: gr00t

  # Base GR00T adapter (Arena defaults); LIBERO SFT overrides below.
  # ``override`` is required because hf_model.yaml already selects adapter=pi0.
  - override /model/adapter@cluster.actor_rollout_ref.model.adapter: gr00t

  - _self_

# LIBERO Spatial demonstrations consumed through the LeRobot dataloader.
data:
  _target_: verl_vla.utils.dataloader.LeRobotDataLoaderConfig
  repo_id: lerobot/libero_spatial_image
  root: null
  revision: main
  batch_size: 32
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  shuffle: true
  drop_last: true
  seed: 42
  video_backend: pyav
  action_delta_steps: 16

# Keep the sharded checkpoint for resume, and also export a directly loadable
# Hugging Face model at global_step_<N>/actor/huggingface.
cluster:
  actor_rollout_ref:
    model:
      adapter:
        # Native LIBERO policy IO (not Arena).
        policy_type: libero
        embodiment_tag: libero_panda
        action_dim: 7
        embodiment_id: 2
        num_action_chunks: 8
        critic:
          enabled: False
        # Inject MODALITY_CONFIGS[libero_panda] when loading from a base GR1 ckpt.
        override_modality_configs: True
        use_relative_action: True
        freeze_vision_tower: False
        freeze_action_io: False
      override_config:
        # Eagle requires BF16 initialization at this GR00T commit.
        load_bf16: true

    actor:
      checkpoint:
        save_contents: ["model", "optimizer", "extra", "hf_model"]
        load_contents: ["model", "optimizer", "extra"]
