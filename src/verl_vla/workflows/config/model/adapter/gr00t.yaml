# GR00T N1.6 Arena/SAC adapter configuration.
# These settings belong to the verl-vla adapter, not the native Hugging Face policy.

# Policy and embodiment -------------------------------------------------------

# Policy I/O adapter registered under verl_vla.models.gr00t_n1d6.policy.
policy_type: arena

# Embodiment tag used to select the processor modality configuration.
embodiment_tag: gr1

# Number of real environment action dimensions before GR00T padding.
action_dim: 26

# GR00T embodiment projector index for GR1.
embodiment_id: 20

# Number of decoded action steps executed per environment interaction.
# This must not exceed the checkpoint action horizon.
num_action_chunks: 16

# Processor -------------------------------------------------------------------

# Optional normalization statistics override. Null uses statistics bundled
# with the checkpoint processor.
norm_stats_path: null

# Whether to replace checkpoint modality metadata with the official config for
# the selected embodiment. Null auto-detects official non-GR1 embodiments.
override_modality_configs: null

# Whether the processor represents actions relative to the current state.
# Null preserves the checkpoint processor setting.
use_relative_action: null

# Critic ----------------------------------------------------------------------

# Optional critic owned by the adapter rather than the native GR00T policy.
# Single-task Arena GR1 / LIBERO SAC uses one shared cross_attn critic.
# pi05-style multi_cross_attn + task_ids is only needed when one policy trains
# many LIBERO task_ids with separate Q-heads; Arena launchers pin one task, so
# it is intentionally not implemented here.
critic:
  # Whether to construct the critic for SAC training.
  enabled: true

  # Critic architecture. cross_attn pools action tokens with learned queries.
  type: cross_attn

  # Number of Q-value heads produced by the critic.
  head_num: 10

  # Number of attention heads used to pool the GR00T prefix representation.
  prefix_attn_heads: 8

  # Critic scores only the executed chunk (not the full decoded horizon, often 50).
  action_horizon: 16

  # Whether to apply layer normalization in the critic head.
  layernorm: false

# Trainable policy components -------------------------------------------------

# Freeze the Eagle vision tower during online RL.
freeze_vision_tower: true

# Keep the action-head input/output adapters trainable.
freeze_action_io: false

# Flow-SDE --------------------------------------------------------------------

# Stochastic flow sampler described in arXiv:2510.25889.
# When disabled the sampler reduces bit-identically to the deterministic Euler ODE.
# Note: GR00T integrates noise→action (t: 0→1); do not reuse pi0 formulas.
flow_sde_enable: false

# Base Flow-SDE per-step noise level.
flow_sde_noise_level: 0.065

# Rollout-time Flow-SDE noise scale.
flow_sde_rollout_noise_scale: 1.0

# Train-time Flow-SDE noise scale.
flow_sde_train_noise_scale: 1.0

# Initial Flow-SDE beta.
flow_sde_initial_beta: 1.0

# Minimum Flow-SDE beta.
flow_sde_beta_min: 0.02

# Flow-SDE beta cosine-anneal horizon (optimiser steps).
flow_sde_beta_schedule_T: 4000
